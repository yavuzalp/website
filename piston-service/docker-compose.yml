# Local self-hosted stack: real Piston (executes Python) + the AlgoArena
# grading proxy in front of it. Mirrors the halalLife docker-compose.yml
# pattern (multiple services, env-driven config) but only two services here.
#
# NOTE: this file could not be run end-to-end in the sandbox this project was
# built in (no Docker available there) — see README.md "What still needs
# verifying" before relying on it in production.
services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    restart: unless-stopped
    privileged: true  # Piston's isolate sandbox needs cgroup access
    ports:
      - "2000:2000"
    volumes:
      - piston-data:/piston/packages

  # One-time init container: installs the Python 3.10 runtime package into
  # the shared piston-data volume. Run once (`docker compose run piston-init`)
  # after the piston service is up, or whenever you bump the pinned version.
  piston-init:
    image: curlimages/curl:8.9.1
    depends_on:
      - piston
    entrypoint: >
      sh -c "curl -s -X POST http://piston:2000/api/v2/packages/python/3.10.0/install -H 'Content-Type: application/json'"

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      PISTON_URL: http://piston:2000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5000}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}
    depends_on:
      - piston

volumes:
  piston-data:
