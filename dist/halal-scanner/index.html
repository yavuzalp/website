<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Halal Scanner — scan or search food products to check ingredient compliance, built by Yavuzalp Turkoglu" />
        <title>Halal Scanner · Yavuzalp Turkoglu</title>
        <!-- Anti-flash: set theme before first paint -->
        <script>!function(){var t=localStorage.getItem('theme-pref')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}();</script>
        <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico" />
        <script src="https://use.fontawesome.com/releases/v5.15.1/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:500,700" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Muli:400,400i,800,800i" rel="stylesheet" type="text/css" />
        <link href="/css/styles.css" rel="stylesheet" />
        <link href="/css/futuristic.css" rel="stylesheet" />
        <style>
            /* ── Halal Scanner embed layout ── */
            body, html { height: 100%; margin: 0; }

            /* Override resume-section padding for the embed page */
            .hs-wrapper {
                display: flex;
                flex-direction: column;
                height: 100vh;
                padding: 0 !important;
            }

            .hs-header {
                flex-shrink: 0;
                padding: 1.25rem 2rem 1rem;
                background: #ffffff;
                border-bottom: 1px solid rgba(0,0,0,.08);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
            }

            .hs-title {
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            .hs-title h1 {
                font-family: 'Saira Extra Condensed', sans-serif;
                font-size: 1.6rem;
                font-weight: 700;
                margin: 0;
                color: var(--text-1) !important;
                letter-spacing: 0.04rem;
                animation: none !important;  /* suppress page-level glowPulse here */
            }

            .hs-title h1 span { color: var(--accent) !important; }

            .hs-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                padding: 0.2rem 0.7rem;
                border-radius: 999px;
                font-size: 0.7rem;
                font-weight: 700;
                letter-spacing: 0.06rem;
                text-transform: uppercase;
                background: rgba(21,128,61,.1);
                color: #15803d;
                border: 1px solid rgba(21,128,61,.2);
            }

            .hs-badge .dot {
                width: 6px; height: 6px;
                border-radius: 50%;
                background: #15803d;
                animation: livePulse 1.8s ease-in-out infinite;
            }

            @keyframes livePulse {
                0%, 100% { opacity: 1; transform: scale(1); }
                50%       { opacity: 0.4; transform: scale(0.7); }
            }

            .hs-meta {
                font-size: 0.75rem;
                color: var(--text-3);
            }

            .hs-meta a {
                color: var(--text-3) !important;
                text-decoration: none;
                transition: color .15s;
            }
            .hs-meta a:hover { color: var(--accent) !important; }

            /* Stack on very small screens */
            @media (max-width: 500px) {
                .hs-meta { display: none; }
                .hs-header { padding: 0.9rem 1rem; }
            }

            /* The iframe itself */
            .hs-frame-container {
                flex: 1;
                position: relative;
                overflow: hidden;
            }

            #halalFrame {
                width: 100%;
                height: 100%;
                border: none;
                display: block;
                background: var(--bg);
            }

            /* Loading overlay shown until iframe fires load event */
            .hs-loader {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1rem;
                background: var(--bg);
                z-index: 10;
                transition: opacity .5s ease;
            }
            .hs-loader.hidden { opacity: 0; pointer-events: none; }

            .hs-spinner {
                width: 44px; height: 44px;
                border: 3px solid rgba(0,0,0,.10);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin .8s linear infinite;
            }
            @keyframes spin { to { transform: rotate(360deg); } }

            .hs-loader p {
                font-size: 0.8rem;
                color: var(--text-3);
                margin: 0;
                letter-spacing: 0.05rem;
            }

            /* Main content area — sits below the fixed top navbar */
            #page-content {
                margin-left: 0;
                margin-top: 60px;
                height: calc(100vh - 60px);
                display: flex;
                flex-direction: column;
            }
        </style>
    </head>
    <body id="page-top" class="topnav">
        <!-- Navigation (same sidebar as portfolio) -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" id="sideNav">
            <a class="navbar-brand" href="/">
                <span class="d-block d-lg-none">Yavuzalp <span class="brand-accent">Turkoglu</span></span>
                <span class="d-none d-lg-block" aria-hidden="true"></span>
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/halal-scanner/">Halal Scanner</a></li>
                    <li class="nav-item"><a class="nav-link" href="/interview-prep/">Interview Prep</a></li>
                </ul>
            </div>
            <button class="theme-toggle" id="theme-toggle" title="Switch to dark mode" aria-label="Toggle dark/light mode">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
        </nav>

        <!-- Page content -->
        <div id="page-content">
            <div class="hs-wrapper">
                <!-- Header bar -->
                <div class="hs-header">
                    <div class="hs-title">
                        <h1>Halal <span>Scanner</span></h1>
                        <span class="hs-badge">
                            <span class="dot"></span>
                            Live
                        </span>
                    </div>
                    <div class="hs-meta">
                        React &middot; Railway &middot;
                        <a href="https://halal-web-production.up.railway.app" target="_blank" rel="noopener">
                            Open standalone <i class="fas fa-external-link-alt" style="font-size:.65rem;"></i>
                        </a>
                    </div>
                </div>

                <!-- iframe container -->
                <div class="hs-frame-container">
                    <div class="hs-loader" id="hsLoader">
                        <div class="hs-spinner"></div>
                        <p>Loading Halal Scanner&hellip;</p>
                    </div>
                    <iframe
                        id="halalFrame"
                        src="https://halal-web-production.up.railway.app"
                        title="Halal Scanner application"
                        allow="camera; microphone"
                        loading="lazy"
                    ></iframe>
                </div>
            </div>
        </div>

        <!-- Bootstrap core JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            // Hide loader once iframe content is ready
            document.getElementById('halalFrame').addEventListener('load', function() {
                var loader = document.getElementById('hsLoader');
                loader.classList.add('hidden');
                setTimeout(function() { loader.style.display = 'none'; }, 500);
            });
        </script>
        <script src="/js/theme.js"></script>
    </body>
</html>
